<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Attendance Entry</title>
<style>
  :root{
    --bg:#0b0d12; --panel:#161a22; --panel2:#1e2430; --border:#2a3140;
    --text:#eef1f7; --muted:#8b93a3; --accent:#5b8cff; --accent2:#8b5bff;
    --p:#2fbf6b; --a:#ef4759; --hd:#f0b429; --h:#a06bff; --ph:#2bb7c7;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;font-family:'Segoe UI',system-ui,sans-serif;color:var(--text);
    background:
      radial-gradient(circle at 15% -10%, rgba(91,140,255,.16), transparent 40%),
      radial-gradient(circle at 90% 0%, rgba(139,91,255,.14), transparent 45%),
      var(--bg);
    min-height:100vh;
  }
  header{
    padding:20px 22px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;
    align-items:center;flex-wrap:wrap;gap:10px;
    background:linear-gradient(90deg, rgba(91,140,255,.10), rgba(139,91,255,.06) 60%, transparent);
  }
  header h1{
    font-size:19px;margin:0;font-weight:700;letter-spacing:.2px;
    background:linear-gradient(90deg, #fff, #b9c6ff);
    -webkit-background-clip:text;background-clip:text;color:transparent;
  }
  .tabs{display:flex;gap:4px;padding:10px 20px 0;border-bottom:1px solid var(--border);position:relative;}
  .tab{
    padding:10px 16px;border-radius:10px 10px 0 0;cursor:pointer;font-size:13px;color:var(--muted);
    font-weight:600;transition:color .18s ease, background .18s ease;position:relative;
  }
  .tab:hover{color:var(--text);}
  .tab.active{color:var(--text);}
  .tab.active::after{
    content:'';position:absolute;left:8px;right:8px;bottom:-1px;height:2px;
    background:linear-gradient(90deg, var(--accent), var(--accent2));border-radius:2px;
  }
  .wrap{max-width:920px;margin:0 auto;padding:18px;}
  .card{
    background:linear-gradient(180deg, rgba(255,255,255,.02), transparent), var(--panel);
    border:1px solid var(--border);border-radius:14px;padding:18px;margin-bottom:16px;
    box-shadow:0 1px 0 rgba(255,255,255,.02) inset, 0 8px 24px -12px rgba(0,0,0,.5);
    transition:border-color .2s ease, box-shadow .2s ease;
    animation:cardIn .35s ease both;
  }
  @keyframes cardIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}
  .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
  label{font-size:11.5px;color:var(--muted);display:block;margin-bottom:5px;font-weight:600;letter-spacing:.3px;text-transform:uppercase;}
  select,input{
    background:var(--panel2);border:1px solid var(--border);color:var(--text);border-radius:9px;
    padding:9px 11px;font-size:14px;transition:border-color .15s ease, box-shadow .15s ease;
  }
  select:focus,input:focus{
    outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(91,140,255,.18);
  }
  input.invalid{border-color:var(--a);box-shadow:0 0 0 3px rgba(239,71,89,.18);}
  button{
    background:linear-gradient(135deg, var(--accent), var(--accent2));color:#fff;border:none;border-radius:9px;
    padding:10px 18px;font-size:14px;cursor:pointer;font-weight:700;letter-spacing:.2px;
    transition:transform .12s ease, box-shadow .12s ease, filter .12s ease;
    box-shadow:0 4px 14px -6px rgba(91,140,255,.5);
  }
  button:hover{transform:translateY(-1px);filter:brightness(1.08);box-shadow:0 6px 18px -6px rgba(91,140,255,.65);}
  button:active{transform:translateY(0);filter:brightness(.95);}
  button.secondary{background:var(--panel2);border:1px solid var(--border);color:var(--text);box-shadow:none;}
  button.secondary:hover{border-color:var(--accent);box-shadow:0 0 0 3px rgba(91,140,255,.12);}
  button:disabled{opacity:.5;cursor:not-allowed;transform:none;filter:none;}
  .banner{
    background:linear-gradient(135deg, rgba(240,180,41,.12), rgba(240,180,41,.04));
    border:1px solid #f0b42955;color:#f0c14a;padding:14px;border-radius:12px;margin-bottom:16px;font-size:13px;
    animation:cardIn .3s ease both;
  }
  table{width:100%;border-collapse:collapse;}
  th,td{padding:10px 8px;text-align:left;border-bottom:1px solid var(--border);font-size:13px;}
  th{color:var(--muted);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.4px;}
  tbody tr{transition:background .15s ease;}
  tbody tr:hover{background:rgba(255,255,255,.03);}
  .statusbtns{display:flex;gap:5px;}
  .sbtn{
    width:34px;height:30px;border-radius:7px;border:1px solid var(--border);background:var(--panel2);
    color:var(--muted);font-size:12px;font-weight:700;cursor:pointer;transition:transform .12s ease, box-shadow .12s ease, background .15s ease;
  }
  .sbtn:hover{transform:translateY(-1px);border-color:var(--accent);}
  .sbtn.sel-P{background:var(--p);color:#fff;border-color:var(--p);box-shadow:0 0 0 3px rgba(47,191,107,.25);}
  .sbtn.sel-A{background:var(--a);color:#fff;border-color:var(--a);box-shadow:0 0 0 3px rgba(239,71,89,.25);}
  .sbtn.sel-HD{background:var(--hd);color:#1a1a1a;border-color:var(--hd);box-shadow:0 0 0 3px rgba(240,180,41,.25);}
  .sbtn.sel-H{background:var(--h);color:#fff;border-color:var(--h);box-shadow:0 0 0 3px rgba(160,107,255,.25);}
  .sbtn.sel-PH{background:var(--ph);color:#fff;border-color:var(--ph);box-shadow:0 0 0 3px rgba(43,183,199,.25);}
  .markall-btn{
    border:1px solid var(--border);border-radius:9px;padding:7px 14px;font-size:12px;font-weight:700;
    cursor:pointer;color:#fff;transition:transform .12s ease, filter .12s ease;box-shadow:none;
  }
  .markall-btn:hover{transform:translateY(-1px);filter:brightness(1.1);}
  .markall-P{background:var(--p);}
  .markall-A{background:var(--a);}
  .markall-H{background:var(--h);}
  .markall-PH{background:var(--ph);}

  /* status color coding for report/date-summary day cells */
  .day-P{background:rgba(47,191,107,.16);color:var(--p);font-weight:700;}
  .day-A{background:rgba(239,71,89,.16);color:var(--a);font-weight:700;}
  .day-HD{background:rgba(240,180,41,.16);color:var(--hd);font-weight:700;}
  .day-H{background:rgba(160,107,255,.16);color:var(--h);font-weight:700;}
  .day-PH{background:rgba(43,183,199,.16);color:var(--ph);font-weight:700;}

  /* freeze header row while scrolling the report table */
  #reportCard.table-scroll{max-height:65vh;overflow-y:auto;}
  #reportTable thead th{position:sticky;top:0;z-index:2;background:var(--panel2);box-shadow:0 1px 0 var(--border);}
  #reportTable thead th:first-child, #reportTable tbody td:first-child{position:sticky;left:0;z-index:1;background:var(--panel);}
  #reportTable thead th:first-child{z-index:3;}
  .toast{
    position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);
    background:var(--panel2);border:1px solid var(--border);padding:13px 20px;border-radius:12px;
    font-size:13px;opacity:0;pointer-events:none;box-shadow:0 10px 30px -8px rgba(0,0,0,.6);
    max-width:90%;text-align:center;transition:opacity .25s ease, transform .25s ease;
    border-left:3px solid var(--accent);
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);pointer-events:auto;}
  .muted{color:var(--muted);font-size:12px;}
  .hidden{display:none;}
  .badge{font-size:11px;padding:3px 9px;border-radius:20px;background:var(--panel2);color:var(--muted);font-weight:600;}
  .badge.inactive{color:var(--a);background:rgba(239,71,89,.12);}
  .badge:not(.inactive){color:var(--p);background:rgba(47,191,107,.12);}
  .suggest{margin-top:8px;font-size:12px;color:var(--muted);}
  .suggest span{
    display:inline-block;background:var(--panel2);border:1px solid var(--border);border-radius:7px;
    padding:4px 9px;margin:2px 4px 0 0;transition:border-color .15s ease;
  }
  .suggest span:hover{border-color:var(--accent);}
  .table-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;}
  .sup-chip{
    display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;padding:3px 10px 3px 6px;
    border-radius:20px;background:var(--panel2);
  }
  .sup-chip::before{content:'';width:8px;height:8px;border-radius:50%;background:var(--chip-color, var(--accent));}
  tab-tab { display:none; }

  @keyframes savedPulse{
    0%{box-shadow:0 0 0 0 rgba(47,191,107,.6);}
    100%{box-shadow:0 0 0 14px rgba(47,191,107,0);}
  }
  .pulse-ok{animation:savedPulse .6s ease;}

  @media (max-width: 640px) {
    header{padding:14px 16px;}
    .wrap{padding:10px;}
    .tabs{padding:10px 16px;overflow-x:auto;flex-wrap:nowrap;}
    .tab{flex:0 0 auto;white-space:nowrap;}
    .card{padding:12px;}
    .row{flex-direction:column;align-items:stretch;gap:8px;}
    .row > div{width:100%;}
    select,input{width:100%;font-size:16px;padding:11px 10px;} /* 16px prevents iOS zoom-on-focus */
    button{width:100%;padding:12px 16px;}
    .row .markall-btn{width:auto;flex:1;}
    .sbtn{width:44px;height:40px;font-size:13px;}
    th,td{padding:8px 6px;font-size:12px;}
  }
</style>
</head>
<body>

<header>
  <h1>Attendance Entry</h1>
  <div class="row">
    <button class="secondary" onclick="showTab('add')">+ New Employee</button>
  </div>
</header>

<div class="tabs">
  <div class="tab active" id="tab-entry" onclick="showTab('entry')">Attendance Entry</div>
  <div class="tab" id="tab-add" onclick="showTab('add')">Add Employee</div>
  <div class="tab" id="tab-report" onclick="showTab('report')">Report</div>
  <div class="tab" id="tab-datesummary" onclick="showTab('datesummary')">Date Summary</div>
</div>

<div class="wrap">

  <!-- ATTENDANCE ENTRY TAB -->
  <div id="panel-entry">
    <div class="card">
      <div class="row">
        <div>
          <label>Supervisor</label>
          <select id="supervisorInput"><option value="">Select supervisor...</option></select>
        </div>
        <div>
          <label>Year</label>
          <input type="number" id="yearInput" value="2026" style="width:90px">
        </div>
        <div>
          <label>Month</label>
          <select id="monthInput">
            <option>January</option><option>February</option><option>March</option>
            <option>April</option><option>May</option><option>June</option>
            <option selected>July</option><option>August</option><option>September</option>
            <option>October</option><option>November</option><option>December</option>
          </select>
        </div>
        <div>
          <label>Date</label>
          <input type="number" id="dayInput" min="1" max="31" value="5" style="width:70px">
        </div>
        <div style="align-self:flex-end;">
          <button onclick="loadMonth()">Load</button>
        </div>
      </div>
    </div>

    <div id="newMonthBanner" class="banner hidden">
      <div id="newMonthMsg"></div>
      <div class="row" style="margin-top:10px;">
        <button onclick="setupMonth()">Create rows for missing employees</button>
      </div>
    </div>

    <div class="card" id="entryCard" style="display:none;">
      <div class="row" style="justify-content:space-between;margin-bottom:12px;">
        <div class="muted" id="entryMeta"></div>
        <div class="row" style="gap:8px;">
          <button class="secondary" onclick="downloadEntryExcel()">Download Excel</button>
          <button onclick="saveAttendance()">Save Attendance</button>
        </div>
      </div>
      <div class="row" style="margin-bottom:8px;">
        <span class="muted" style="margin-right:4px;">Mark all:</span>
        <button type="button" class="markall-btn markall-P" onclick="markAll('P')">All Present</button>
        <button type="button" class="markall-btn markall-A" onclick="markAll('A')">All Absent</button>
        <button type="button" class="markall-btn markall-H" onclick="markAll('H')">All Week Off</button>
        <button type="button" class="markall-btn markall-PH" onclick="markAll('PH')">All Paid Holiday</button>
      </div>
      <div class="table-scroll">
        <table id="entryTable">
          <thead><tr><th>EMP ID</th><th>Name</th><th>Status</th></tr></thead>
          <tbody id="entryBody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- ADD EMPLOYEE TAB -->
  <div id="panel-add" class="hidden">
    <div class="card">
      <h3 style="margin-top:0;">Add New Employee</h3>
      <div class="row">
        <div>
          <label>EMP ID</label>
          <input type="text" id="newEmpId" placeholder="e.g. 71" oninput="onEmpIdInput()">
        </div>
        <div>
          <label>Name</label>
          <input type="text" id="newEmpName" list="empNamesList" placeholder="Full name" oninput="onNameInput()">
          <datalist id="empNamesList"></datalist>
        </div>
        <div>
          <label>Supervisor</label>
          <input type="text" id="newEmpSupervisor" placeholder="Supervisor">
        </div>
        <div>
          <label>Company</label>
          <input type="text" id="newEmpCompany" placeholder="Company">
        </div>
        <div>
          <label>Active</label>
          <select id="newEmpActive"><option value="Y">Y — Active</option><option value="N">N — Not Active</option></select>
        </div>
        <div style="align-self:flex-end;">
          <button id="saveEmpBtn" onclick="addEmployee()">Save Employee</button>
        </div>
      </div>
      <div class="suggest hidden" id="nameSuggest"></div>
    </div>
    <div class="card">
      <div class="row" style="justify-content:space-between;">
        <h3 style="margin:0;">Employee List</h3>
        <button class="secondary" onclick="downloadExcel('empListTable','Employee_List.xlsx')">Download Excel</button>
      </div>
      <div class="table-scroll">
        <table id="empListTable">
          <thead><tr><th>EMP ID</th><th>Name</th><th>Supervisor</th><th>Company</th><th>Status</th></tr></thead>
          <tbody id="empListBody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- REPORT TAB -->
  <div id="panel-report" class="hidden">
    <div class="card">
      <div class="row">
        <div>
          <label>Supervisor</label>
          <select id="repSupervisor"><option value="">All</option></select>
        </div>
        <div>
          <label>Year</label>
          <input type="number" id="repYear" value="2026" style="width:90px">
        </div>
        <div>
          <label>Month</label>
          <select id="repMonth">
            <option value="">All</option>
            <option>January</option><option>February</option><option>March</option>
            <option>April</option><option>May</option><option>June</option>
            <option selected>July</option><option>August</option><option>September</option>
            <option>October</option><option>November</option><option>December</option>
          </select>
        </div>
        <div>
          <label>EMP ID</label>
          <input type="text" id="repEmpId" list="empIdsList" placeholder="Optional" style="width:110px" oninput="onRepEmpIdInput()">
          <datalist id="empIdsList"></datalist>
        </div>
        <div>
          <label>Name</label>
          <input type="text" id="repName" placeholder="Optional (auto-fills from EMP ID)">
        </div>
        <div style="align-self:flex-end;">
          <button onclick="loadReport()">Run Report</button>
        </div>
      </div>
    </div>
    <div class="card table-scroll" id="reportCard" style="display:none;">
      <div class="row" style="justify-content:space-between;margin-bottom:10px;">
        <div class="muted" id="reportMeta"></div>
        <button class="secondary" onclick="downloadExcel('reportTable','Attendance_Report.xlsx')">Download Excel</button>
      </div>
      <table id="reportTable" style="min-width:1400px;">
        <thead><tr id="reportHeadRow"></tr></thead>
        <tbody id="reportBody"></tbody>
      </table>
    </div>
  </div>

  <!-- DATE SUMMARY TAB -->
  <div id="panel-datesummary" class="hidden">
    <div class="card">
      <div class="row">
        <div>
          <label>Supervisor</label>
          <select id="dsSupervisor"><option value="">All</option></select>
        </div>
        <div>
          <label>Year</label>
          <input type="number" id="dsYear" value="2026" style="width:90px">
        </div>
        <div>
          <label>Month</label>
          <select id="dsMonth">
            <option>January</option><option>February</option><option>March</option>
            <option>April</option><option>May</option><option>June</option>
            <option selected>July</option><option>August</option><option>September</option>
            <option>October</option><option>November</option><option>December</option>
          </select>
        </div>
        <div style="align-self:flex-end;">
          <button onclick="loadDateSummary()">Run Summary</button>
        </div>
      </div>
    </div>
    <div class="card" id="dsCard" style="display:none;">
      <div class="row" style="justify-content:space-between;margin-bottom:10px;">
        <div class="muted" id="dsMeta"></div>
        <button class="secondary" onclick="downloadExcel('dsTable','Date_Summary.xlsx')">Download Excel</button>
      </div>
      <div class="table-scroll">
        <table id="dsTable">
          <thead><tr><th>Date</th><th>Total</th><th>Present</th><th>Absent</th><th>Week Off</th><th>Half Day</th><th>Paid Holiday</th></tr></thead>
          <tbody id="dsBody"></tbody>
        </table>
      </div>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
function downloadExcel(tableId, filename) {
  const table = document.getElementById(tableId);
  if (!table || !table.querySelector('tbody').children.length) return toast('Nothing to export yet — run the report first');
  const wb = XLSX.utils.table_to_book(table, { sheet: 'Sheet1' });
  XLSX.writeFile(wb, filename);
}
function downloadExcelFromRows(headers, rows, filename) {
  if (!rows.length) return toast('Nothing to export yet — load data first');
  const ws = XLSX.utils.aoa_to_sheet([headers, ...rows]);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Sheet1');
  XLSX.writeFile(wb, filename);
}
function downloadEntryExcel() {
  const rows = [...document.querySelectorAll('#entryBody tr')].map(tr => {
    const empId = tr.children[0].textContent;
    const name = tr.children[1].textContent;
    const selected = tr.querySelector('button[class*="sel-"]');
    return [empId, name, selected ? selected.dataset.status : ''];
  });
  downloadExcelFromRows(['EMP ID', 'Name', 'Status'], rows, 'Attendance_Entry.xlsx');
}
</script>
<script>
// ⚠️ Paste your Apps Script Web App /exec URL here
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx-tNS3leU11oZ0rmMNVTL77ZSoeLNBHhHP5t2bIJUugidMwfTzknuars1eE7EloDLu2w/exec";

let allEmployees = [];

function jsonp(params) {
  return new Promise((resolve, reject) => {
    const cbName = 'cb_' + Date.now() + '_' + Math.floor(Math.random()*10000);
    window[cbName] = (data) => { resolve(data); cleanup(); };
    const script = document.createElement('script');
    const qs = Object.keys(params).map(k => encodeURIComponent(k)+'='+encodeURIComponent(params[k])).join('&');
    script.src = SCRIPT_URL + '?' + qs + '&callback=' + cbName;
    script.onerror = () => { reject(new Error('Request failed')); cleanup(); };
    function cleanup(){ delete window[cbName]; script.remove(); }
    document.body.appendChild(script);
  });
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._hideTimer);
  t._hideTimer = setTimeout(() => t.classList.remove('show'), 4000);
}

// Deterministic color per supervisor name, for chips/dropdowns
function colorForName(name) {
  let hash = 0;
  for (let i = 0; i < name.length; i++) hash = name.charCodeAt(i) + ((hash << 5) - hash);
  const hue = Math.abs(hash) % 360;
  return `hsl(${hue}, 70%, 60%)`;
}

function showTab(name) {
  document.getElementById('panel-entry').classList.toggle('hidden', name !== 'entry');
  document.getElementById('panel-add').classList.toggle('hidden', name !== 'add');
  document.getElementById('panel-report').classList.toggle('hidden', name !== 'report');
  document.getElementById('panel-datesummary').classList.toggle('hidden', name !== 'datesummary');
  document.getElementById('tab-entry').classList.toggle('active', name === 'entry');
  document.getElementById('tab-add').classList.toggle('active', name === 'add');
  document.getElementById('tab-report').classList.toggle('active', name === 'report');
  document.getElementById('tab-datesummary').classList.toggle('active', name === 'datesummary');
  if (name === 'add') loadEmployeeList();
  if (name === 'report') loadReportSupervisors();
  if (name === 'datesummary') loadDsSupervisors();
}

async function loadDsSupervisors() {
  if (!allEmployees.length) await loadEmployeeList();
  const supervisors = [...new Set(allEmployees.filter(e => e.supervisor).map(e => e.supervisor))].sort();
  const sel = document.getElementById('dsSupervisor');
  if (sel.options.length <= 1) {
    sel.innerHTML = '<option value="">All</option>' + supervisors.map(s => `<option value="${s}">${s}</option>`).join('');
  }
}

async function loadDateSummary() {
  const supervisor = document.getElementById('dsSupervisor').value;
  const year = document.getElementById('dsYear').value;
  const month = document.getElementById('dsMonth').value;

  const res = await jsonp({ action: 'getDateSummary', year, month, supervisor });
  if (!res.success) return toast('Error: ' + res.error);

  const tbody = document.getElementById('dsBody');
  tbody.innerHTML = '';
  res.summary.forEach(s => {
    const tr = document.createElement('tr');
    tr.innerHTML = `<td>${s.day}</td><td>${s.total}</td><td>${s.present}</td><td>${s.absent}</td><td>${s.holiday}</td><td>${s.halfDay}</td><td>${s.paidHoliday}</td>`;
    tbody.appendChild(tr);
  });
  document.getElementById('dsMeta').textContent = `${month} ${year}${supervisor ? ' — ' + supervisor : ''} — ${res.employeeCount} employee row(s)`;
  document.getElementById('dsCard').style.display = 'block';
}

async function loadReportSupervisors() {
  if (!allEmployees.length) await loadEmployeeList();
  const supervisors = [...new Set(allEmployees.filter(e => e.supervisor).map(e => e.supervisor))].sort();
  const sel = document.getElementById('repSupervisor');
  if (sel.options.length <= 1) {
    sel.innerHTML = '<option value="">All</option>' + supervisors.map(s => `<option value="${s}">${s}</option>`).join('');
  }
}

function onRepEmpIdInput() {
  const idVal = document.getElementById('repEmpId').value.trim();
  if (!idVal) return;
  const match = allEmployees.find(e => normIdClient(e.empId) === normIdClient(idVal));
  if (!match) {
    document.getElementById('repName').value = '';
    toast(`EMP ID ${idVal} not found in EMP tab`);
    return;
  }
  document.getElementById('repName').value = match.name;
  const supSel = document.getElementById('repSupervisor');
  if (match.supervisor && [...supSel.options].some(o => o.value === match.supervisor)) {
    supSel.value = match.supervisor;
  }
}

async function loadReport() {
  const supervisor = document.getElementById('repSupervisor').value;
  const year = document.getElementById('repYear').value;
  const month = document.getElementById('repMonth').value;
  const empId = document.getElementById('repEmpId').value.trim();
  const name = document.getElementById('repName').value.trim();

  const res = await jsonp({ action: 'getReport', year, month, supervisor, empId, name });
  if (!res.success) return toast('Error: ' + res.error);

  const headRow = document.getElementById('reportHeadRow');
  headRow.innerHTML = '<th>EMP ID</th><th>Name</th>' +
    Array.from({length:31}, (_,i) => `<th>${i+1}</th>`).join('') +
    '<th>Total</th><th>Present</th><th>Absent</th><th>Week Off</th><th>Half Day</th><th>Paid Holiday</th>';

  const tbody = document.getElementById('reportBody');
  tbody.innerHTML = '';
  res.rows.forEach(r => {
    const tr = document.createElement('tr');
    tr.innerHTML = `<td>${r.empId}</td><td>${r.name}</td>` +
      r.days.map(d => `<td class="${d ? 'day-'+d : ''}">${d}</td>`).join('') +
      `<td>${r.total}</td><td>${r.present}</td><td>${r.absent}</td><td>${r.holiday}</td><td>${r.halfDay}</td><td>${r.paidHoliday}</td>`;
    tbody.appendChild(tr);
  });
  document.getElementById('reportMeta').textContent = `${res.rows.length} employee-month row(s)`;
  document.getElementById('reportCard').style.display = 'block';
  if (!res.rows.length) toast('No matching records');
}

async function loadSupervisors() {
  const res = await jsonp({ action: 'getEmployees' });
  if (!res.success) return;
  allEmployees = res.employees;
  const supervisors = [...new Set(allEmployees.filter(e => e.active && e.supervisor).map(e => e.supervisor))].sort();
  const sel = document.getElementById('supervisorInput');
  sel.innerHTML = '<option value="">Select supervisor...</option>' +
    supervisors.map(s => `<option value="${s}">${s}</option>`).join('');
}

async function loadMonth() {
  const supervisor = document.getElementById('supervisorInput').value;
  if (!supervisor) return toast('Select a supervisor first');
  const year = document.getElementById('yearInput').value;
  const month = document.getElementById('monthInput').value;
  document.getElementById('entryCard').style.display = 'none';
  document.getElementById('newMonthBanner').classList.add('hidden');

  const check = await jsonp({ action: 'checkMonth', year, month });
  if (!check.success) return toast('Error: ' + check.error);

  if (check.isNewMonth) {
    document.getElementById('newMonthMsg').textContent =
      `New month detected — ${check.missingCount} active employee(s) not yet set up for ${month} ${year}. Rows will use each employee's Supervisor/Company from the EMP tab.`;
    document.getElementById('newMonthBanner').classList.remove('hidden');
    return;
  }
  loadDate();
}

async function setupMonth() {
  const year = document.getElementById('yearInput').value;
  const month = document.getElementById('monthInput').value;
  const res = await jsonp({ action: 'setupMonth', year, month });
  if (!res.success) return toast('Error: ' + res.error);
  toast(`${res.added} employee row(s) created for ${month} ${year}`);
  document.getElementById('newMonthBanner').classList.add('hidden');
  loadDate();
}

async function loadDate() {
  const supervisor = document.getElementById('supervisorInput').value;
  const year = document.getElementById('yearInput').value;
  const month = document.getElementById('monthInput').value;
  const day = document.getElementById('dayInput').value;
  const res = await jsonp({ action: 'getAttendanceForDate', year, month, day, supervisor });
  if (!res.success) return toast('Error: ' + res.error);

  const tbody = document.getElementById('entryBody');
  tbody.innerHTML = '';
  res.records.forEach(rec => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${rec.empId}</td>
      <td>${rec.name}</td>
      <td class="statusbtns" data-empid="${rec.empId}">
        ${['P','A','HD','H','PH'].map(s => `<button type="button" class="sbtn ${rec.status===s?'sel-'+s:''}" data-status="${s}" onclick="setStatus(this)">${s==='H'?'WO':s}</button>`).join('')}
      </td>`;
    tbody.appendChild(tr);
  });
  document.getElementById('entryMeta').innerHTML =
    `<span class="sup-chip" style="--chip-color:${colorForName(supervisor)}">${supervisor}</span> ${month} ${year} — Day ${day} — ${res.records.length} employee(s)`;
  document.getElementById('entryCard').style.display = res.records.length ? 'block' : 'none';
  if (!res.records.length) toast('No employees found for this supervisor/month');
}

function setStatus(btn) {
  const cell = btn.parentElement;
  [...cell.children].forEach(b => b.className = 'sbtn');
  btn.classList.add('sel-' + btn.dataset.status);
}

function markAll(status) {
  document.querySelectorAll('#entryBody .statusbtns').forEach(cell => {
    [...cell.children].forEach(b => {
      b.className = 'sbtn' + (b.dataset.status === status ? ' sel-' + status : '');
    });
  });
}

async function saveAttendance() {
  const year = document.getElementById('yearInput').value;
  const month = document.getElementById('monthInput').value;
  const day = document.getElementById('dayInput').value;

  const rows = document.querySelectorAll('#entryBody tr');
  const records = [];
  rows.forEach(tr => {
    const cell = tr.querySelector('.statusbtns');
    const selected = cell.querySelector('button[class*="sel-"]');
    records.push({ empId: cell.dataset.empid, status: selected ? selected.dataset.status : '' });
  });

  const res = await jsonp({ action: 'saveAttendance', year, month, day, records: JSON.stringify(records) });
  if (!res.success) return toast('Error: ' + res.error);
  if (res.notFoundIds && res.notFoundIds.length) {
    toast(`Saved ${res.updated}/${res.totalRecordsSent}. Not found: ${res.notFoundIds.join(', ')}`);
  } else {
    toast(`Saved attendance for ${res.updated} employee(s) — Day ${day}`);
    const card = document.getElementById('entryCard');
    card.classList.remove('pulse-ok'); void card.offsetWidth; card.classList.add('pulse-ok');
  }
}

async function loadEmployeeList() {
  const res = await jsonp({ action: 'getEmployees' });
  if (!res.success) return toast('Error: ' + res.error);
  allEmployees = res.employees;
  const tbody = document.getElementById('empListBody');
  tbody.innerHTML = '';
  allEmployees.forEach(e => {
    const tr = document.createElement('tr');
    const supChip = e.supervisor ? `<span class="sup-chip" style="--chip-color:${colorForName(e.supervisor)}">${e.supervisor}</span>` : '';
    tr.innerHTML = `<td>${e.empId}</td><td>${e.name}</td><td>${supChip}</td><td>${e.company||''}</td>
      <td><span class="badge ${e.active ? '' : 'inactive'}">${e.active ? 'Active' : 'Not Active'}</span></td>`;
    tbody.appendChild(tr);
  });
  const namesList = document.getElementById('empNamesList');
  namesList.innerHTML = [...new Set(allEmployees.map(e => e.name))].sort()
    .map(n => `<option value="${n}">`).join('');
  const idsList = document.getElementById('empIdsList');
  if (idsList) idsList.innerHTML = allEmployees.map(e => `<option value="${e.empId}">${e.empId} — ${e.name}</option>`).join('');
}

function normIdClient(v) {
  const s = String(v).trim();
  if (/^\d+$/.test(s)) return String(parseInt(s, 10));
  return s.toUpperCase();
}

function validateNewEmpForm() {
  const empId = document.getElementById('newEmpId').value.trim();
  const nameField = document.getElementById('newEmpName');
  if (empId && !nameField.value.trim()) {
    nameField.classList.add('invalid');
  } else {
    nameField.classList.remove('invalid');
  }
}

function onEmpIdInput() {
  validateNewEmpForm();
  const idVal = document.getElementById('newEmpId').value.trim();
  const btn = document.getElementById('saveEmpBtn');
  if (!idVal) { btn.textContent = 'Save Employee'; return; }
  const match = allEmployees.find(e => normIdClient(e.empId) === normIdClient(idVal));
  if (match) {
    document.getElementById('newEmpName').value = match.name;
    document.getElementById('newEmpSupervisor').value = match.supervisor || '';
    document.getElementById('newEmpCompany').value = match.company || '';
    document.getElementById('newEmpActive').value = match.active ? 'Y' : 'N';
    btn.textContent = 'Update Employee';
  } else {
    btn.textContent = 'Save Employee';
  }
}

function onNameInput() {
  validateNewEmpForm();
  const q = document.getElementById('newEmpName').value.trim().toLowerCase();
  const box = document.getElementById('nameSuggest');
  if (!q) { box.classList.add('hidden'); box.innerHTML=''; return; }
  const matches = allEmployees.filter(e => e.name.toLowerCase().includes(q)).slice(0, 8);
  if (!matches.length) { box.classList.add('hidden'); box.innerHTML=''; return; }
  box.classList.remove('hidden');
  box.innerHTML = 'Existing employees matching this name: ' + matches.map(e => `<span>${e.name} (#${e.empId})</span>`).join('');
}

async function addEmployee() {
  const empId = document.getElementById('newEmpId').value.trim();
  const name = document.getElementById('newEmpName').value.trim();
  const supervisor = document.getElementById('newEmpSupervisor').value.trim();
  const company = document.getElementById('newEmpCompany').value.trim();
  const active = document.getElementById('newEmpActive').value;
  if (empId && !name) { validateNewEmpForm(); return toast('Name is required when EMP ID is filled'); }
  if (!empId || !name) return toast('EMP ID and Name are required');

  const isUpdate = allEmployees.some(e => normIdClient(e.empId) === normIdClient(empId));
  const action = isUpdate ? 'updateEmployee' : 'addEmployee';
  const res = await jsonp({ action, empId, name, active, supervisor, company });
  if (!res.success) return toast('Error: ' + res.error);
  toast(isUpdate ? 'Employee updated' : 'Employee added');
  document.getElementById('newEmpId').value = '';
  document.getElementById('newEmpName').value = '';
  document.getElementById('newEmpSupervisor').value = '';
  document.getElementById('newEmpCompany').value = '';
  document.getElementById('saveEmpBtn').textContent = 'Save Employee';
  document.getElementById('nameSuggest').classList.add('hidden');
  loadEmployeeList();
  loadSupervisors();
}

function setTodayDefaults() {
  const MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];
  const today = new Date();
  const y = today.getFullYear(), m = MONTHS[today.getMonth()], d = today.getDate();
  document.getElementById('yearInput').value = y;
  document.getElementById('monthInput').value = m;
  document.getElementById('dayInput').value = d;
  document.getElementById('repYear').value = y;
  document.getElementById('repMonth').value = m;
  document.getElementById('dsYear').value = y;
  document.getElementById('dsMonth').value = m;
}

// init
loadEmployeeList();
loadSupervisors();
setTodayDefaults();
</script>

</body>
